<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROWLAB — Demo</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
:root {
    --bg-primary: #0a0a0a;
    --bg-panel: #111111;
    --border: #222222;
    --border-subtle: #1a1a1a;
    --text-primary: #e0e0e0;
    --text-secondary: #888888;
    --text-dim: #555555;
    --accent-cyan: #00bcd4;
    --accent-amber: #ffb300;
    --accent-green: #4caf50;
    --accent-red: #ef5350;
    --accent-violet: #7c4dff;
    --color-light: var(--accent-amber);
    --color-water: var(--accent-cyan);
    --color-air: var(--text-primary);
    --color-root: var(--accent-green);
    --color-plant: var(--accent-violet);
    --font-body: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    --font-data: 'Space Mono', 'SF Mono', 'Fira Code', monospace;
    --gap: 12px;
    --radius: 4px;
}

* { margin: 0; padding: 0; box-sizing: border-box; }

html, body {
    height: 100%;
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: var(--font-body);
    font-size: 14px;
    line-height: 1.5;
    overflow-x: hidden;
}

.observatory-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 16px 24px; border-bottom: 1px solid var(--border);
}

.observatory-title {
    font-family: var(--font-data); font-size: 16px; font-weight: 400;
    letter-spacing: 2px; text-transform: uppercase; color: var(--text-secondary);
}

.time-controls { display: flex; gap: 4px; }

.time-btn {
    background: transparent; border: 1px solid var(--border); color: var(--text-dim);
    font-family: var(--font-data); font-size: 11px; padding: 4px 12px;
    cursor: pointer; border-radius: var(--radius); transition: all 0.3s ease;
}
.time-btn:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
.time-btn.active { border-color: var(--text-primary); color: var(--text-primary); background: var(--bg-panel); }

.system-clock {
    font-family: var(--font-data); font-size: 16px; color: var(--text-secondary);
    min-width: 240px; text-align: right;
}

.observatory-grid {
    display: grid; grid-template-columns: 1fr 1fr 1fr; grid-template-rows: 1fr 1fr;
    gap: var(--gap); padding: var(--gap) 24px; height: calc(100vh - 110px);
}

.panel {
    background: var(--bg-panel); border: 1px solid var(--border); border-radius: var(--radius);
    padding: 16px; display: flex; flex-direction: column;
    transition: border-color 0.8s ease, box-shadow 0.8s ease; overflow: hidden;
}
.panel:hover { border-color: var(--text-dim); }

.panel-header { display: flex; align-items: baseline; gap: 12px; margin-bottom: 12px; }

.panel-label {
    font-family: var(--font-data); font-size: 14px; font-weight: 700;
    letter-spacing: 4px; text-transform: uppercase;
}

.panel-light { border-left: 2px solid var(--color-light); }
.panel-water { border-left: 2px solid var(--color-water); }
.panel-air { border-left: 2px solid var(--color-air); }
.panel-root { border-left: 2px solid var(--color-root); }
.panel-plant { border-left: 2px solid var(--color-plant); }

.panel-light .panel-label { color: var(--color-light); }
.panel-water .panel-label { color: var(--color-water); }
.panel-air .panel-label { color: var(--color-air); }
.panel-root .panel-label { color: var(--color-root); }
.panel-plant .panel-label { color: var(--color-plant); }

.panel-value {
    font-family: var(--font-data); font-size: clamp(36px, 5vw, 64px);
    font-weight: 700; line-height: 1; color: var(--text-primary);
    transition: opacity 0.4s ease, color 1s ease;
}
.panel-value.updating { opacity: 0.6; }

.panel-unit { font-family: var(--font-data); font-size: 16px; color: var(--text-dim); }

/* === RANGE INDICATORS === */
.range-normal { color: var(--text-primary); }
.range-warning { color: var(--accent-amber) !important; transition: color 1s ease; }
.range-critical { color: var(--accent-red) !important; transition: color 1s ease; }

.panel:has(.range-critical) {
    border-color: var(--accent-red);
    box-shadow: inset 0 0 30px rgba(239, 83, 80, 0.04);
}
.panel:has(.range-warning) {
    border-color: var(--accent-amber);
    box-shadow: inset 0 0 20px rgba(255, 179, 0, 0.03);
}

.meta-item.range-warning { color: var(--accent-amber) !important; }
.meta-item.range-critical { color: var(--accent-red) !important; }

/* === CHARTS === */
.panel-chart { flex: 1; min-height: 80px; position: relative; }
.panel-chart svg { width: 100%; height: 100%; }
.panel-chart .grid line { stroke: var(--border-subtle); stroke-dasharray: 2 4; }
.panel-chart .grid .domain { display: none; }
.panel-chart .axis text { font-family: var(--font-data); font-size: 11px; fill: var(--text-dim); }
.panel-chart .axis .domain, .panel-chart .axis line { stroke: var(--border); }
.target-band { pointer-events: none; }

.panel-plant { grid-column: 3; grid-row: 1 / 3; }
.plant-layout { flex: 1; display: flex; flex-direction: column; gap: var(--gap); min-height: 0; }

.panel-camera {
    flex: 1; min-height: 80px; display: flex; align-items: center; justify-content: center;
    background: #080808; border-radius: var(--radius); overflow: hidden;
}
.camera-placeholder { font-family: var(--font-data); font-size: 13px; color: var(--text-dim); letter-spacing: 1px; }
.plant-gauge { display: flex; align-items: center; justify-content: center; min-height: 120px; }
.plant-gauge svg { overflow: visible; }

.panel-meta {
    display: flex; gap: 16px; margin-top: 8px; padding-top: 8px;
    border-top: 1px solid var(--border-subtle);
}
.meta-item { font-family: var(--font-data); font-size: 13px; color: var(--text-secondary); transition: color 1s ease; }

.observatory-footer {
    position: fixed; bottom: 0; left: 0; right: 0;
    border-top: 1px solid var(--border); background: var(--bg-primary);
}
.status-bar {
    display: flex; align-items: center; gap: 16px; padding: 10px 24px;
    font-family: var(--font-data); font-size: 14px; color: var(--text-dim);
}
.status-indicator { font-size: 12px; }
.status-indicator.connected { color: var(--accent-green); }

@media (max-width: 900px) {
    .observatory-grid { grid-template-columns: 1fr 1fr; grid-template-rows: auto; }
    .panel-plant { grid-column: auto; grid-row: auto; }
}
@media (max-width: 600px) {
    .observatory-grid { grid-template-columns: 1fr; }
    .observatory-header { flex-direction: column; gap: 8px; }
}
@media (min-width: 1200px) {
    .panel-value { font-size: clamp(48px, 5vw, 72px); }
}

/* Demo mode label */
.demo-controls {
    position: fixed; top: 12px; left: 50%; transform: translateX(-50%);
    z-index: 100; display: flex; gap: 8px; align-items: center;
}
.demo-toggle {
    background: var(--bg-panel); border: 1px solid var(--border); color: var(--text-dim);
    font-family: var(--font-data); font-size: 10px; padding: 3px 10px;
    cursor: pointer; border-radius: var(--radius); transition: all 0.3s ease;
    text-transform: uppercase; letter-spacing: 1px;
}
.demo-toggle:hover { border-color: var(--text-secondary); color: var(--text-secondary); }
.demo-toggle.active { border-color: var(--accent-amber); color: var(--accent-amber); }
    </style>
</head>
<body>
    <!-- Demo controls overlay -->
    <div class="demo-controls">
        <button class="demo-toggle" id="btn-normal">Normal</button>
        <button class="demo-toggle" id="btn-drift">Drift</button>
        <button class="demo-toggle active" id="btn-mixed">Mixed</button>
    </div>

    <header class="observatory-header">
        <h1 class="observatory-title">GROWLAB</h1>
        <div class="time-controls">
            <button class="time-btn" data-window="1h">1H</button>
            <button class="time-btn active" data-window="24h">24H</button>
            <button class="time-btn" data-window="7d">7D</button>
        </div>
        <div class="system-clock" id="system-clock"></div>
    </header>

    <main class="observatory-grid">
        <section class="panel panel-light">
            <div class="panel-header">
                <span class="panel-label">LIGHT</span>
                <span class="panel-value" id="light-value">192</span>
                <span class="panel-unit">PWM</span>
            </div>
            <div class="panel-chart" id="chart-light"></div>
            <div class="panel-meta">
                <span class="meta-item">Auto</span>
                <span class="meta-item">6:00 AM — 10:00 PM</span>
            </div>
        </section>

        <section class="panel panel-water">
            <div class="panel-header">
                <span class="panel-label">WATER</span>
                <span class="panel-value" id="water-value">6</span>
                <span class="panel-unit">events</span>
            </div>
            <div class="panel-chart" id="chart-water"></div>
            <div class="panel-meta">
                <span class="meta-item" id="water-last">Last: --</span>
            </div>
        </section>

        <section class="panel panel-air">
            <div class="panel-header">
                <span class="panel-label">AIR</span>
                <span class="panel-value" id="air-temp">74.3</span>
                <span class="panel-unit">&deg;F</span>
            </div>
            <div class="panel-chart" id="chart-air"></div>
            <div class="panel-meta">
                <span class="meta-item" id="air-humidity">Humidity: 62%</span>
                <span class="meta-item" id="air-pressure">Pressure: 1013 hPa</span>
            </div>
        </section>

        <section class="panel panel-root">
            <div class="panel-header">
                <span class="panel-label">ROOT</span>
                <span class="panel-value" id="root-ph">6.12</span>
                <span class="panel-unit">pH</span>
            </div>
            <div class="panel-chart" id="chart-root"></div>
            <div class="panel-meta">
                <span class="meta-item" id="root-ec">EC: 1240 &micro;S/cm</span>
                <span class="meta-item" id="root-temp">Temp: 68.4&deg;F</span>
            </div>
        </section>

        <section class="panel panel-plant">
            <div class="panel-header">
                <span class="panel-label">PLANT</span>
                <span class="panel-value" id="soil-moisture-value">54</span>
                <span class="panel-unit">% moisture</span>
            </div>
            <div class="plant-layout">
                <div class="panel-camera" id="camera-feed">
                    <div class="camera-placeholder">Camera feed</div>
                </div>
                <div class="plant-gauge" id="soil-moisture-gauge"></div>
            </div>
            <div class="panel-meta">
                <span class="meta-item" id="plant-capture-time">--</span>
                <span class="meta-item">46 captures</span>
            </div>
        </section>
    </main>

    <footer class="observatory-footer">
        <div class="status-bar">
            <span class="status-indicator connected">&#9679;</span>
            <span>Connected (demo)</span>
            <span>7 sensors</span>
            <span>12,847 readings</span>
        </div>
    </footer>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script>
    // ============================================================
    // Shared helpers
    // ============================================================
    function formatTime(date) {
        return date.toLocaleTimeString("en-US", { hour: "numeric", minute: "2-digit" });
    }
    function formatDateTime(date) {
        return date.toLocaleDateString("en-US", { month: "short", day: "numeric" }) + " " + formatTime(date);
    }
    function timeAgo(date) {
        var diff = Math.floor((Date.now() - date.getTime()) / 1000);
        if (diff < 60) return "just now";
        if (diff < 3600) return Math.floor(diff / 60) + "m ago";
        if (diff < 86400) return Math.floor(diff / 3600) + "h ago";
        return Math.floor(diff / 86400) + "d ago";
    }

    // ============================================================
    // Range system
    // ============================================================
    var RANGES = {
        air_temp:      [60, 65, 80, 85],
        air_humidity:  [30, 40, 70, 80],
        root_ph:       [5.0, 5.8, 6.5, 7.5],
        root_ec:       [400, 800, 1600, 2000],
        root_temp:     [55, 60, 75, 80],
        soil_moisture: [20, 40, 70, 85],
    };

    function classify(key, value) {
        var r = RANGES[key];
        if (!r) return "normal";
        if (value < r[0] || value > r[3]) return "critical";
        if (value < r[1] || value > r[2]) return "warning";
        return "normal";
    }

    function setRangeStatus(el, status) {
        if (!el) return;
        el.classList.remove("range-normal", "range-warning", "range-critical");
        el.classList.add("range-" + status);
    }

    // ============================================================
    // Mock data
    // ============================================================
    function generateTimeSeries(hours, intervalMin, fn) {
        var data = [], now = new Date();
        var start = now.getTime() - hours * 3600000;
        var step = intervalMin * 60000;
        for (var t = start; t <= now.getTime(); t += step) {
            data.push({ timestamp: new Date(t).toISOString(), value: fn(t) });
        }
        return data;
    }

    function lightData() {
        return generateTimeSeries(24, 15, function (t) {
            var h = new Date(t).getHours();
            return (h >= 6 && h < 22) ? 180 + Math.random() * 30 : 0;
        });
    }

    // Demo modes: "normal" (all in range), "drift" (things drifting out), "mixed" (some ok, some not)
    var demoMode = "mixed";

    function airTempBase() {
        if (demoMode === "drift") return 83;  // warning zone (80-85)
        return 73;
    }

    function airTempData() {
        return generateTimeSeries(24, 5, function (t) {
            var h = new Date(t).getHours() + new Date(t).getMinutes() / 60;
            var base = airTempBase() + 5 * Math.sin((h - 6) * Math.PI / 12);
            return base + (Math.random() - 0.5) * 1.5;
        });
    }

    function airHumData() {
        return generateTimeSeries(24, 5, function (t) {
            var h = new Date(t).getHours() + new Date(t).getMinutes() / 60;
            var base = (demoMode === "drift") ? 78 : 62;
            return base - 8 * Math.sin((h - 6) * Math.PI / 12) + (Math.random() - 0.5) * 4;
        });
    }

    var _phVal, _ecVal;
    function phData() {
        _phVal = (demoMode === "mixed" || demoMode === "drift") ? 7.1 : 6.1;
        return generateTimeSeries(24, 10, function () {
            _phVal += (Math.random() - 0.5) * 0.04;
            return _phVal;
        });
    }

    function ecData() {
        _ecVal = 1200;
        return generateTimeSeries(24, 10, function () {
            _ecVal += (Math.random() - 0.5) * 40;
            return _ecVal;
        });
    }

    function irrigationEvents() {
        var events = [], now = new Date();
        [2, 6, 10, 14, 18, 22].forEach(function (h) {
            var t = new Date(now.getTime() - h * 3600000 + Math.random() * 1800000);
            events.push({ timestamp: t.toISOString(), event_type: "irrigation" });
        });
        return events.sort(function (a, b) { return b.timestamp.localeCompare(a.timestamp); });
    }

    // ============================================================
    // LIGHT CHART
    // ============================================================
    window.GrowLab = {};

    window.GrowLab.createLightChart = function (id) {
        var c = document.getElementById(id); if (!c) return null;
        var rect = c.getBoundingClientRect();
        var m = { top: 8, right: 8, bottom: 20, left: 40 };
        var w = (rect.width||240)-m.left-m.right, h = (rect.height||80)-m.top-m.bottom;
        var svg = d3.select(c).append("svg").attr("width",w+m.left+m.right).attr("height",h+m.top+m.bottom)
            .append("g").attr("transform","translate("+m.left+","+m.top+")");
        var x = d3.scaleTime().range([0,w]), y = d3.scaleLinear().range([h,0]);
        svg.append("g").attr("class","grid").attr("transform","translate(0,"+h+")")
            .call(d3.axisBottom(x).ticks(4).tickSize(-h).tickFormat(""));
        svg.append("path").attr("class","light-area");
        svg.append("path").attr("class","light-line");
        svg.append("g").attr("class","axis x-axis").attr("transform","translate(0,"+h+")");
        svg.append("g").attr("class","axis y-axis");
        function update(data) {
            if (!data||!data.length) return;
            var p = data.map(function(d){return{time:new Date(d.timestamp),value:d.value};});
            x.domain(d3.extent(p,function(d){return d.time;}));
            y.domain([0,Math.max(d3.max(p,function(d){return d.value;})*1.1,10)]);
            var line=d3.line().x(function(d){return x(d.time);}).y(function(d){return y(d.value);}).curve(d3.curveStepAfter);
            var area=d3.area().x(function(d){return x(d.time);}).y0(h).y1(function(d){return y(d.value);}).curve(d3.curveStepAfter);
            svg.select(".light-line").datum(p).transition().duration(800).attr("d",line).attr("fill","none").attr("stroke","var(--accent-amber)").attr("stroke-width",1.5);
            svg.select(".light-area").datum(p).transition().duration(800).attr("d",area).attr("fill","var(--accent-amber)").attr("opacity",0.12);
            svg.select(".x-axis").transition().duration(400).call(d3.axisBottom(x).ticks(4).tickFormat(d3.timeFormat("%-I%p")));
            svg.select(".y-axis").transition().duration(400).call(d3.axisLeft(y).ticks(4));
        }
        return {update:update};
    };

    // ============================================================
    // WATER — Pulse strip
    // ============================================================
    window.GrowLab.createWaterTimeline = function (id) {
        var c = document.getElementById(id); if (!c) return null;
        var rect = c.getBoundingClientRect();
        var m = { top: 12, right: 8, bottom: 20, left: 8 };
        var w = (rect.width||240)-m.left-m.right, h = (rect.height||80)-m.top-m.bottom;
        var svg = d3.select(c).append("svg").attr("width",w+m.left+m.right).attr("height",h+m.top+m.bottom)
            .append("g").attr("transform","translate("+m.left+","+m.top+")");
        var x = d3.scaleTime().range([0,w]);
        var baseline = h * 0.75, spikeTop = 6;
        svg.append("g").attr("class","axis x-axis").attr("transform","translate(0,"+h+")");
        svg.append("path").attr("class","pulse-glow").attr("fill","none").attr("stroke","var(--accent-cyan)")
            .attr("stroke-width",4).attr("stroke-linejoin","round").attr("opacity",0.08);
        svg.append("path").attr("class","pulse-line").attr("fill","none").attr("stroke","var(--accent-cyan)")
            .attr("stroke-width",1.5).attr("stroke-linejoin","round");

        function buildPath(events, xs) {
            var sorted = events.slice().sort(function(a,b){return a.time-b.time;});
            var dom = xs.domain(), sw = Math.max(2, w*0.008);
            var p = ["M", xs(dom[0]), baseline];
            sorted.forEach(function(e) {
                var cx = xs(e.time);
                p.push("L",cx-sw,baseline, "L",cx,spikeTop, "L",cx+sw*0.6,baseline+4, "L",cx+sw*1.5,baseline);
            });
            p.push("L", xs(dom[1]), baseline);
            return p.join(" ");
        }

        function update(events) {
            if (!events||!events.length) return;
            var parsed = events.map(function(e){return{time:new Date(e.timestamp)};});
            var ext = d3.extent(parsed,function(d){return d.time;});
            var pad = (ext[1]-ext[0])*0.05||3600000;
            x.domain([new Date(ext[0]-pad), new Date(ext[1].getTime()+pad)]);
            var pathD = buildPath(parsed, x);
            svg.select(".pulse-line").transition().duration(800).attr("d",pathD);
            svg.select(".pulse-glow").transition().duration(800).attr("d",pathD);
            svg.select(".x-axis").transition().duration(400).call(d3.axisBottom(x).ticks(4).tickFormat(d3.timeFormat("%-I%p")));
        }
        return {update:update};
    };

    // ============================================================
    // AIR — Dual-axis with target bands
    // ============================================================
    window.GrowLab.createAirChart = function (id) {
        var c = document.getElementById(id); if (!c) return null;
        var rect = c.getBoundingClientRect();
        var m = { top: 8, right: 40, bottom: 20, left: 40 };
        var w = (rect.width||240)-m.left-m.right, h = (rect.height||80)-m.top-m.bottom;
        var svg = d3.select(c).append("svg").attr("width",w+m.left+m.right).attr("height",h+m.top+m.bottom)
            .append("g").attr("transform","translate("+m.left+","+m.top+")");
        var x = d3.scaleTime().range([0,w]);
        var yT = d3.scaleLinear().range([h,0]), yH = d3.scaleLinear().range([h,0]);
        svg.append("g").attr("class","grid").attr("transform","translate(0,"+h+")")
            .call(d3.axisBottom(x).ticks(4).tickSize(-h).tickFormat(""));

        // Target bands
        var tempBand = svg.append("rect").attr("class","target-band").attr("x",0).attr("width",w)
            .attr("fill","var(--text-primary)").attr("opacity",0.04);
        var humBand = svg.append("rect").attr("class","target-band").attr("x",0).attr("width",w)
            .attr("fill","var(--accent-cyan)").attr("opacity",0.04);

        svg.append("path").attr("class","hum-area");
        svg.append("path").attr("class","hum-line");
        svg.append("path").attr("class","temp-area");
        svg.append("path").attr("class","temp-line");
        svg.append("g").attr("class","axis x-axis").attr("transform","translate(0,"+h+")");
        svg.append("g").attr("class","axis y-axis-left");
        svg.append("g").attr("class","axis y-axis-right").attr("transform","translate("+w+",0)");

        function update(td, hd) {
            if ((!td||!td.length)&&(!hd||!hd.length)) return;
            var pT = (td||[]).map(function(d){return{time:new Date(d.timestamp),value:d.value};});
            var pH = (hd||[]).map(function(d){return{time:new Date(d.timestamp),value:d.value};});
            x.domain(d3.extent(pT.map(function(d){return d.time;}).concat(pH.map(function(d){return d.time;}))));

            if (pT.length) {
                var te = d3.extent(pT,function(d){return d.value;}), tp=(te[1]-te[0])*0.15||2;
                yT.domain([te[0]-tp,te[1]+tp]);
                // Position temp target band (65-80°F)
                var tbT=yT(80), tbB=yT(65);
                tempBand.attr("y",Math.min(tbT,tbB)).attr("height",Math.abs(tbB-tbT));
            }
            yH.domain([0,100]);
            // Position humidity target band (40-70%)
            var hbT=yH(70), hbB=yH(40);
            humBand.attr("y",Math.min(hbT,hbB)).attr("height",Math.abs(hbB-hbT));

            var cv = d3.curveCatmullRom.alpha(0.5);
            if (pT.length) {
                svg.select(".temp-line").datum(pT).transition().duration(800)
                    .attr("d",d3.line().x(function(d){return x(d.time);}).y(function(d){return yT(d.value);}).curve(cv))
                    .attr("fill","none").attr("stroke","var(--text-primary)").attr("stroke-width",1.5);
                svg.select(".temp-area").datum(pT).transition().duration(800)
                    .attr("d",d3.area().x(function(d){return x(d.time);}).y0(h).y1(function(d){return yT(d.value);}).curve(cv))
                    .attr("fill","var(--text-primary)").attr("opacity",0.08);
            }
            if (pH.length) {
                svg.select(".hum-line").datum(pH).transition().duration(800)
                    .attr("d",d3.line().x(function(d){return x(d.time);}).y(function(d){return yH(d.value);}).curve(cv))
                    .attr("fill","none").attr("stroke","var(--accent-cyan)").attr("stroke-width",1).attr("opacity",0.4);
                svg.select(".hum-area").datum(pH).transition().duration(800)
                    .attr("d",d3.area().x(function(d){return x(d.time);}).y0(h).y1(function(d){return yH(d.value);}).curve(cv))
                    .attr("fill","var(--accent-cyan)").attr("opacity",0.05);
            }
            svg.select(".x-axis").transition().duration(400).call(d3.axisBottom(x).ticks(4).tickFormat(d3.timeFormat("%-I%p")));
            svg.select(".y-axis-left").transition().duration(400).call(d3.axisLeft(yT).ticks(4).tickFormat(function(d){return d.toFixed(0)+"\u00b0";}));
            svg.select(".y-axis-right").transition().duration(400).call(d3.axisRight(yH).ticks(4).tickFormat(function(d){return d+"%";}));
        }
        return {update:update};
    };

    // ============================================================
    // ROOT — Stacked sparklines
    // ============================================================
    window.GrowLab.createRootChart = function (id) {
        var c = document.getElementById(id); if (!c) return null;
        var rect = c.getBoundingClientRect();
        var m = { top: 4, right: 8, bottom: 20, left: 40 };
        var fw = (rect.width||240)-m.left-m.right, fh = (rect.height||80)-m.top-m.bottom;
        var gap = 8, ch = (fh-gap)/2;
        var svg = d3.select(c).append("svg").attr("width",fw+m.left+m.right).attr("height",fh+m.top+m.bottom)
            .append("g").attr("transform","translate("+m.left+","+m.top+")");

        var phG = svg.append("g"), phX = d3.scaleTime().range([0,fw]), phY = d3.scaleLinear().range([ch,0]);
        var phBand = phG.append("rect").attr("x",0).attr("width",fw).attr("fill","var(--accent-green)").attr("opacity",0.06);
        phG.append("path").attr("class","ph-line");
        phG.append("g").attr("class","axis ph-y-axis");
        phG.append("text").attr("x",-4).attr("y",-2).attr("text-anchor","end")
            .attr("fill","var(--accent-green)").attr("font-family","var(--font-data)").attr("font-size","10px").text("pH");

        var ecOff = ch+gap;
        var ecG = svg.append("g").attr("transform","translate(0,"+ecOff+")");
        var ecX = d3.scaleTime().range([0,fw]), ecY = d3.scaleLinear().range([ch,0]);
        var ecBand = ecG.append("rect").attr("x",0).attr("width",fw).attr("fill","var(--accent-green)").attr("opacity",0.06);
        ecG.append("path").attr("class","ec-line");
        ecG.append("g").attr("class","axis ec-y-axis");
        ecG.append("g").attr("class","axis ec-x-axis").attr("transform","translate(0,"+ch+")");
        ecG.append("text").attr("x",-4).attr("y",-2).attr("text-anchor","end")
            .attr("fill","var(--accent-green)").attr("font-family","var(--font-data)").attr("font-size","10px").attr("opacity",0.6).text("EC");

        var cv = d3.curveMonotoneX;
        function update(pd, ed) {
            if (pd && pd.length) {
                var pp = pd.map(function(d){return{time:new Date(d.timestamp),value:d.value};});
                phX.domain(d3.extent(pp,function(d){return d.time;}));
                var pe = d3.extent(pp,function(d){return d.value;}), pad = Math.max((pe[1]-pe[0])*0.2,0.2);
                phY.domain([pe[0]-pad,pe[1]+pad]);
                var bT=phY(6.5),bB=phY(5.8);
                phBand.attr("y",Math.min(bT,bB)).attr("height",Math.abs(bB-bT));
                phG.select(".ph-line").datum(pp).transition().duration(800)
                    .attr("d",d3.line().x(function(d){return phX(d.time);}).y(function(d){return phY(d.value);}).curve(cv))
                    .attr("fill","none").attr("stroke","var(--accent-green)").attr("stroke-width",1.5);
                phG.select(".ph-y-axis").transition().duration(400)
                    .call(d3.axisLeft(phY).ticks(3).tickFormat(function(d){return d.toFixed(1);}));
            }
            if (ed && ed.length) {
                var ep = ed.map(function(d){return{time:new Date(d.timestamp),value:d.value};});
                ecX.domain(d3.extent(ep,function(d){return d.time;}));
                var ee = d3.extent(ep,function(d){return d.value;}), epad = Math.max((ee[1]-ee[0])*0.2,50);
                ecY.domain([ee[0]-epad,ee[1]+epad]);
                var ebT=ecY(1600),ebB=ecY(800);
                ecBand.attr("y",Math.min(ebT,ebB)).attr("height",Math.abs(ebB-ebT));
                ecG.select(".ec-line").datum(ep).transition().duration(800)
                    .attr("d",d3.line().x(function(d){return ecX(d.time);}).y(function(d){return ecY(d.value);}).curve(cv))
                    .attr("fill","none").attr("stroke","var(--accent-green)").attr("stroke-width",1.5).attr("opacity",0.7);
                ecG.select(".ec-y-axis").transition().duration(400).call(d3.axisLeft(ecY).ticks(3));
                ecG.select(".ec-x-axis").transition().duration(400).call(d3.axisBottom(ecX).ticks(4).tickFormat(d3.timeFormat("%-I%p")));
            }
        }
        return {update:update};
    };

    // ============================================================
    // SOIL GAUGE
    // ============================================================
    window.GrowLab.createSoilGauge = function (id) {
        var c = document.getElementById(id); if (!c) return null;
        var w=160,h=100,r=70,th=12;
        var svg = d3.select(c).append("svg").attr("width",w).attr("height",h)
            .append("g").attr("transform","translate("+(w/2)+","+(h-10)+")");
        var bg = d3.arc().innerRadius(r-th).outerRadius(r).startAngle(-Math.PI/2).endAngle(Math.PI/2);
        svg.append("path").attr("d",bg).attr("fill","#1a1a1a");
        var va = d3.arc().innerRadius(r-th).outerRadius(r).startAngle(-Math.PI/2);
        var vp = svg.append("path").attr("d",va.endAngle(-Math.PI/2)).attr("fill","#555");
        var vt = svg.append("text").attr("text-anchor","middle").attr("dy","-0.2em")
            .attr("fill","var(--text-dim)").attr("font-family","var(--font-data)").attr("font-size","11px").text("--");
        var cur = -1;
        function mc(p) {
            if(p<=30) return d3.interpolateRgb("#ffb300","#4caf50")(p/30);
            if(p<=70) return "#4caf50";
            return d3.interpolateRgb("#4caf50","#00bcd4")((p-70)/30);
        }
        function update(v) {
            if(v===cur) return; cur=v;
            var p=Math.max(0,Math.min(100,v)), a=-Math.PI/2+(p/100)*Math.PI, col=mc(p);
            vp.transition().duration(1200).ease(d3.easeCubicInOut)
                .attrTween("d",function(){
                    var i=d3.interpolate(vp.node().__ca||-Math.PI/2,a);
                    return function(t){var aa=i(t);vp.node().__ca=aa;return va.endAngle(aa)();};
                }).attr("fill",col);
            vt.transition().duration(400).attr("fill","var(--text-secondary)").text(p.toFixed(0)+"%");
        }
        return {update:update};
    };

    // ============================================================
    // Demo controller
    // ============================================================
    (function () {
        // Clock
        function updateClock() {
            var el = document.getElementById("system-clock");
            if (el) {
                var now = new Date();
                el.textContent = now.toLocaleDateString("en-US", {
                    weekday: "short", month: "short", day: "numeric"
                }) + "  " + formatTime(now);
            }
        }
        setInterval(updateClock, 1000);
        updateClock();

        // Time buttons
        document.querySelectorAll(".time-btn").forEach(function (btn) {
            btn.addEventListener("click", function () {
                document.querySelectorAll(".time-btn").forEach(function (b) { b.classList.remove("active"); });
                btn.classList.add("active");
            });
        });

        var gauge, charts = {};

        function refreshAll() {
            // Rebuild charts by clearing containers
            ["chart-light","chart-water","chart-air","chart-root"].forEach(function(id) {
                var el = document.getElementById(id);
                if (el) el.innerHTML = "";
            });
            var gEl = document.getElementById("soil-moisture-gauge");
            if (gEl) gEl.innerHTML = "";

            charts.light = window.GrowLab.createLightChart("chart-light");
            if (charts.light) charts.light.update(lightData());

            var events = irrigationEvents();
            charts.water = window.GrowLab.createWaterTimeline("chart-water");
            if (charts.water) charts.water.update(events);

            var lastEl = document.getElementById("water-last");
            if (lastEl && events.length) {
                var lt = new Date(events[0].timestamp);
                lastEl.textContent = "Last: " + formatTime(lt) + " (" + timeAgo(lt) + ")";
            }

            charts.air = window.GrowLab.createAirChart("chart-air");
            if (charts.air) charts.air.update(airTempData(), airHumData());

            charts.root = window.GrowLab.createRootChart("chart-root");
            if (charts.root) charts.root.update(phData(), ecData());

            gauge = window.GrowLab.createSoilGauge("soil-moisture-gauge");

            // Set initial values with range indicators
            applyValues();
        }

        function applyValues() {
            var tempF, phVal, ecVal, moisture, humidity;

            if (demoMode === "normal") {
                tempF = 73 + (Math.random() - 0.5) * 2;
                phVal = 6.1 + (Math.random() - 0.5) * 0.1;
                ecVal = 1200 + (Math.random() - 0.5) * 100;
                moisture = 55 + (Math.random() - 0.5) * 10;
                humidity = 58 + (Math.random() - 0.5) * 6;
            } else if (demoMode === "drift") {
                tempF = 83 + (Math.random() - 0.5) * 2;     // warning
                phVal = 7.8 + (Math.random() - 0.5) * 0.1;  // critical
                ecVal = 1850 + (Math.random() - 0.5) * 100;  // warning
                moisture = 88 + (Math.random() - 0.5) * 4;   // critical
                humidity = 78 + (Math.random() - 0.5) * 4;   // warning
            } else { // mixed
                tempF = 74 + (Math.random() - 0.5) * 2;      // normal
                phVal = 6.8 + (Math.random() - 0.5) * 0.1;   // warning (above 6.5)
                ecVal = 1240 + (Math.random() - 0.5) * 100;   // normal
                moisture = 54 + (Math.random() - 0.5) * 6;    // normal
                humidity = 62 + (Math.random() - 0.5) * 4;    // normal
            }

            var airTempEl = document.getElementById("air-temp");
            var rootPhEl = document.getElementById("root-ph");
            var rootEcEl = document.getElementById("root-ec");
            var soilEl = document.getElementById("soil-moisture-value");
            var humEl = document.getElementById("air-humidity");

            if (airTempEl) { airTempEl.textContent = tempF.toFixed(1); setRangeStatus(airTempEl, classify("air_temp", tempF)); }
            if (rootPhEl) { rootPhEl.textContent = phVal.toFixed(2); setRangeStatus(rootPhEl, classify("root_ph", phVal)); }
            if (rootEcEl) { rootEcEl.textContent = "EC: " + ecVal.toFixed(0) + " \u00b5S/cm"; setRangeStatus(rootEcEl, classify("root_ec", ecVal)); }
            if (soilEl) { soilEl.textContent = moisture.toFixed(0); setRangeStatus(soilEl, classify("soil_moisture", moisture)); }
            if (humEl) { humEl.textContent = "Humidity: " + humidity.toFixed(0) + "%"; setRangeStatus(humEl, classify("air_humidity", humidity)); }
            if (gauge) gauge.update(moisture);

            // Plant capture
            var captureEl = document.getElementById("plant-capture-time");
            if (captureEl) {
                var ct = new Date(Date.now() - 45 * 60000);
                captureEl.textContent = formatDateTime(ct) + " (" + timeAgo(ct) + ")";
            }
        }

        // Demo mode toggles
        ["normal","drift","mixed"].forEach(function(mode) {
            var btn = document.getElementById("btn-" + mode);
            if (btn) {
                btn.addEventListener("click", function() {
                    demoMode = mode;
                    document.querySelectorAll(".demo-toggle").forEach(function(b){b.classList.remove("active");});
                    btn.classList.add("active");
                    refreshAll();
                });
            }
        });

        document.addEventListener("DOMContentLoaded", function () {
            refreshAll();

            // Simulate live updates every 3s
            setInterval(function () {
                applyValues();
            }, 3000);
        });
    })();
    </script>
