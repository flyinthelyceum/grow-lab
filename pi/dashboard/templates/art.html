<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROWLAB — Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Space Mono', monospace;
        }
        #art-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .art-label {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 10;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }
        .art-sublabel {
            position: fixed;
            top: 46px;
            left: 24px;
            z-index: 10;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
        .art-nav {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 10;
        }
        .art-nav a {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            text-decoration: none;
            transition: color 0.3s;
        }
        .art-nav a:hover {
            color: rgba(255,255,255,0.5);
        }
        .pressure-readout {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
        .art-readout {
            position: fixed;
            top: 24px;
            right: 24px;
            z-index: 10;
            min-width: 180px;
            padding: 12px 14px;
            border: 1px solid rgba(255,255,255,0.08);
            background: rgba(0,0,0,0.22);
            backdrop-filter: blur(8px);
        }
        .art-readout-row {
            display: flex;
            justify-content: space-between;
            gap: 16px;
            font-size: 11px;
            letter-spacing: 2px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.55);
        }
        .art-readout-row + .art-readout-row {
            margin-top: 8px;
        }
        .art-readout-value {
            color: rgba(255,255,255,0.88);
        }

        @media (max-width: 600px) {
            .art-label {
                top: 12px;
                left: 12px;
                font-size: 12px;
            }
            .art-sublabel {
                display: none;
            }
            .art-readout {
                top: auto;
                bottom: 12px;
                right: 12px;
                left: 12px;
                min-width: 0;
                padding: 10px 12px;
            }
            .art-nav {
                top: 10px;
                bottom: auto;
                left: auto;
                right: 12px;
            }
            .art-nav a {
                font-size: 12px;
                padding: 6px 0;
            }
            .pressure-readout {
                bottom: auto;
                top: 40px;
                right: 12px;
                left: auto;
            }
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet" media="print" onload="this.media='all'">
</head>
<body>
    <div class="art-label">GROWLAB</div>
    <div class="art-sublabel">ENVIRONMENTAL + RESERVOIR — 24H RADIAL</div>
    <div class="art-readout" id="art-readout">
        <div class="art-readout-row"><span>TEMP</span><span class="art-readout-value" id="art-live-temp">--</span></div>
        <div class="art-readout-row"><span>HUMIDITY</span><span class="art-readout-value" id="art-live-humidity">--</span></div>
        <div class="art-readout-row"><span>LAST WATER</span><span class="art-readout-value" id="art-live-water">--</span></div>
        <div class="art-readout-row" style="margin-top:12px;padding-top:8px;border-top:1px solid rgba(255,255,255,0.06)"><span>pH</span><span class="art-readout-value" id="art-live-ph">--</span></div>
        <div class="art-readout-row"><span>EC</span><span class="art-readout-value" id="art-live-ec">--</span></div>
    </div>
    <canvas id="art-canvas"></canvas>
    <div class="pressure-readout" id="pressure-readout"></div>
    <nav class="art-nav">
        <a href="/">OBSERVATORY</a>
        <a href="/dream" style="margin-left:20px">DREAM</a>
    </nav>

    <script src="{{ static_asset('vendor/d3.v7.min.js') }}"></script>
    <script src="{{ static_asset('art/art-core.js') }}"></script>
    <script src="{{ static_asset('art/radial-ring.js') }}"></script>
    <script src="{{ static_asset('art/humidity-ring.js') }}"></script>
    <script src="{{ static_asset('art/water-pulses.js') }}"></script>
    <script src="{{ static_asset('art/pressure-field.js') }}"></script>
    <script src="{{ static_asset('art/ambient-particles.js') }}"></script>
    <script src="{{ static_asset('art/ph-ring.js') }}"></script>
    <script src="{{ static_asset('art/ec-ring.js') }}"></script>
    <script src="{{ static_asset('art.js') }}"></script>
</body>
</html>
