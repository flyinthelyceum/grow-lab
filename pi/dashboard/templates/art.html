<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>GROWLAB — Art</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background: #000;
            font-family: 'Space Mono', monospace;
        }
        #art-canvas {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            cursor: crosshair;
        }
        .art-label {
            position: fixed;
            top: 24px;
            left: 24px;
            z-index: 10;
            font-size: 14px;
            font-weight: 700;
            letter-spacing: 5px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.6);
        }
        .art-sublabel {
            position: fixed;
            top: 46px;
            left: 24px;
            z-index: 10;
            font-size: 10px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.3);
        }
        .art-nav {
            position: fixed;
            bottom: 24px;
            left: 24px;
            z-index: 10;
        }
        .art-nav a {
            font-size: 11px;
            letter-spacing: 3px;
            text-transform: uppercase;
            color: rgba(255,255,255,0.25);
            text-decoration: none;
            transition: color 0.3s;
        }
        .art-nav a:hover {
            color: rgba(255,255,255,0.5);
        }
        .pressure-readout {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 10;
            font-size: 11px;
            letter-spacing: 2px;
            color: rgba(255,255,255,0.2);
            text-transform: uppercase;
        }
    </style>
    <link href="https://fonts.googleapis.com/css2?family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="art-label">GROWLAB</div>
    <div class="art-sublabel">ENVIRONMENTAL ATMOSPHERE — 24H RADIAL</div>
    <canvas id="art-canvas"></canvas>
    <div class="pressure-readout" id="pressure-readout"></div>
    <nav class="art-nav">
        <a href="/">OBSERVATORY</a>
    </nav>

    <script src="https://d3js.org/d3.v7.min.js"></script>
    <script src="/static/art/art-core.js"></script>
    <script src="/static/art/radial-ring.js"></script>
    <script src="/static/art/humidity-ring.js"></script>
    <script src="/static/art/water-pulses.js"></script>
    <script src="/static/art/pressure-field.js"></script>
    <script src="/static/art/ambient-particles.js"></script>
    <script src="/static/art.js"></script>
</body>
</html>
