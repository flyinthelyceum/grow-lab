; Living Light System — ESP32 PWM Controller
; Receives commands over serial from the Raspberry Pi.
; Controls LED dimming via LEDC PWM and pump relay.

[env:esp32s3]
platform = espressif32
board = esp32-s3-devkitc-1
framework = arduino
monitor_speed = 115200
build_unflags = -DARDUINO_USB_MODE=1
build_flags =
    -DLED_PWM_PIN=18
    -DPUMP_RELAY_PIN=17
    -DARDUINO_USB_MODE=0
